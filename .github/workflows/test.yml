name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Run unit tests
        run: forge test -vvv --no-match-path "test/*.fork.t.sol"

      - name: Run fork tests
        if: env.RPC_URL != ''
        env:
          RPC_URL: ${{ secrets.RPC_URL }}
        run: forge test -vvv --match-path "test/*.fork.t.sol"
